services:
  # MongoDB
  mongodb:
    image: mongo:7
    container_name: hirenova-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # MongoDB UI (Mongo Express)
  mongo-express:
    image: mongo-express
    container_name: hirenova-mongo-ui
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb

  # Redis
  redis:
    image: redis:7
    container_name: hirenova-redis
    restart: always
    ports:
      - "6379:6379"

  # Redis UI (Redis Commander)
  redis-commander:
    image: rediscommander/redis-commander
    container_name: hirenova-redis-ui
    restart: always
    ports:
      - "8082:8081"
    environment:
      REDIS_HOSTS: local:redis:6379

  # MailHog (Email testing UI included)
  mailhog:
    image: mailhog/mailhog
    container_name: hirenova-mailhog
    restart: always
    ports:
      - "1025:1025"
      - "8025:8025"

  # MinIO (S3-compatible object storage for resume uploads)
  minio:
    image: minio/minio
    container_name: hirenova-minio
    restart: always
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-hirenova}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-hirenova-minio-secret}
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc
    container_name: hirenova-minio-init
    depends_on:
      - minio
    environment:
      S3_BUCKET: ${S3_BUCKET:-hirenova-resumes}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-hirenova}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-hirenova-minio-secret}
    entrypoint: >
      /bin/sh -c "
      until mc alias set hirenova http://minio:9000 $$S3_ACCESS_KEY $$S3_SECRET_KEY; do sleep 2; done;
      mc mb --ignore-existing hirenova/$$S3_BUCKET;
      mc anonymous set none hirenova/$$S3_BUCKET;
      "

volumes:
  mongo_data:
  minio_data:
